 <style>
 *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 html, body { height: 100%; overflow: hidden; background: #0D0800; font-family: 'Montserrat', sans-serif; color: #fff; }

 /* ═══════════════════════════════════════════════════════
    MOBILE  (default – portrait wheel, 378 × 818 base)
 ═══════════════════════════════════════════════════════ */

 /* Centre the portrait frame in the viewport */
 .scene {
   height: 100vh;
   display: flex;
   align-items: center;
   justify-content: center;
 }

 /* Hide desktop scene on mobile */
 .desk-scene { display: none; }

 /*
  * Frame = 378 × 818 (Figma 1× dimensions).
  * Scale to fill the viewport while preserving aspect ratio.
  */
 .frame {
   position: relative;
   --w: min(100vw, calc(100vh * 378 / 818));
   width: var(--w);
   height: calc(var(--w) * 818 / 378);
   overflow: hidden;
   flex-shrink: 0;
 }

 /* ── All layers are absolutely positioned at Figma % coords ── */
 .layer { position: absolute; display: block; }

 /* Background: Figma Layer 0 (casino photo) */
 .bg {
   inset: 0; width: 100%; height: 100%;
   object-fit: fill; z-index: 0;
 }

 /* Hue/Saturation 2: full-height warm golden overlay */
 .huesat2 {
   left: -0.67%; top: 0%; width: 101.33%; height: 100%;
   object-fit: fill; z-index: 1;
 }

 /* Hue/Saturation 3: warm glow over wheel area */
 .huesat3 {
   left: 9.33%; top: 30.05%; width: 83.60%; height: 45.07%;
   object-fit: fill; z-index: 2;
 }

 /*
  * ── Figma-exact positions (all as % of 378×818 frame) ──
  * Formula: left% = (node.x - frame.x) / frame.w
  *          top%  = (node.y - frame.y) / frame.h
  *          w%    = node.w / frame.w
  * Frame origin (Figma abs): x=-503, y=-68
  */

 /* Logo (4:67)  abs(-427.4,-5.04) w=240.4 h=22.2 */
 .logo {
   left: 20.00%; top: 7.70%; width: 63.60%;
   z-index: 2;
 }

 /* Headline (4:66)  abs(-482.84,56.41) w=343.73 h=76.56 */
 .headline {
   left: 5.33%; top: 15.21%; width: 90.93%;
   z-index: 2;
 }

 /* "Libre Ang Entry" badge (4:70)  abs(-397.16,129.45) w=170.86 h=40.30 */
 .libre {
   left: 28.00%; top: 24.14%; width: 45.20%;
   z-index: 2;
 }

 /* Spinning wheel (4:62 Board)  abs(-467.72,177.80) w=316 h=316 */
 .wheel-wrap {
   left: 9.33%; top: 30.05%; width: 83.60%;
   z-index: 3;
   transform-origin: center center;
 }
 .wheel-wrap img {
   width: 100%; display: block;
   transform-origin: 50% 50%;
 }

 /* Arrow pointer (4:63)  abs(-329.12,173.77) w=36.79 h=53.39 */
 .arrow {
   left: 46.00%; top: 29.55%; width: 9.73%;
   z-index: 4; pointer-events: none;
 }

 /* Centre hub / SPIN disc (4:64)  abs(-343.74,301.21) w=68.54 h=68.50 */
 .hub {
   left: 42.13%; top: 45.14%; width: 18.13%;
   z-index: 5; cursor: pointer;
   animation: btnPulse 1.8s ease-in-out infinite;
   transition: transform .12s cubic-bezier(.34,1.56,.64,1), filter .12s;
 }
 .hub:active { transform: scale(.88); filter: brightness(1.3); animation: none; }

 /* SPIN button (4:65)  abs(-418.83,518.80) w=205.13 h=71.02 */
 .spin-btn {
   left: 22.27%; top: 71.74%; width: 54.27%;
   z-index: 5; cursor: pointer;
   animation: btnPulse 1.8s ease-in-out infinite .3s;
   transition: transform .12s cubic-bezier(.34,1.56,.64,1), filter .12s;
 }
 .spin-btn:active { transform: scale(.92); filter: brightness(1.3); animation: none; }

 @keyframes btnPulse {
   0%,100% { transform: scale(1);    filter: drop-shadow(0 0 6px rgba(255,179,0,.4)); }
   50%      { transform: scale(1.06); filter: drop-shadow(0 0 18px rgba(255,179,0,.9)); }
 }


 /* reward-text image (4:73) */

   left: 6.53%; top: 82.51%; width: 89.07%;

 }

 /* Leaderboard rows overlay on top of frame images */

   left: 11.33%; top: 84.61%; width: 77.33%; height: 5.17%;

   border-radius: 5px;

 }
 .lb-time {

   font-weight: 600;
 }

 @keyframes ripplePop { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1); opacity: 0; } }

 /* ═══════════════════════════════════════════════════════
    DESKTOP  (≥ 1024 px wide)
    Base frame = 1920 × 1080.  All positions are % of that.
    --dw  = CSS width of the frame box
 ═══════════════════════════════════════════════════════ */
 @media (min-width: 1024px) {
   /* swap visibility */
   .scene      { display: none !important; }
   .desk-scene { display: flex !important; }

   .desk-scene {
     height: 100vh;
     align-items: center;
     justify-content: center;
   }

   /*
    * Scale the 1920×1080 canvas to fill the viewport keeping 16:9.
    * --dw = actual CSS pixel width of the rendered frame box.
    */
   .desk-frame {
     position: relative;
     --dw: min(100vw, calc(100vh * 1920 / 1080));
     width: var(--dw);
     height: calc(var(--dw) * 1080 / 1920);
     overflow: hidden;
     flex-shrink: 0;
   }

   /* All desktop layers: absolutely positioned inside .desk-frame */
   .dl { position: absolute; display: block; }

   /*
    * All left/top/width values are derived directly from Figma absolute
    * bounding boxes, frame origin (0,0), frame size 1920×1080.
    *   left%  = node.x / 1920 * 100
    *   top%   = node.y / 1080 * 100
    *   width% = node.w / 1920 * 100
    */

   /* Background (66:18):  x=-1, y=-82, w=2168, h=1185 */

   }
   .d-spin-btn:active { transform: scale(.92); filter: brightness(1.3); animation: none; }


 }

<script>
const wheelImg    = document.getElementById('wheel-img');
const dWheelImg   = document.getElementById('d-wheel-img');

const SEGMENTS = ['100','FREE SPIN','5','50','10','5','FREE SPIN','30','5','50','20','5'];
const SEG_DEG = 360 / SEGMENTS.length; // 30°

// Pre-align '20' (winIdx=10) under the arrow at rest
// segCentre = 10*30 + 15 = 315°  →  toTop = 360-315 = 45°
let rotation = 45, spinning = false;

/* sync both wheel images together */
function setRotation(r) {
 rotation = r;
 const t = `rotate(${r}deg)`;
 wheelImg.style.transform = t;
 dWheelImg.style.transform = t;
}

// Idle slow spin
let idleRaf;
function idleSpin() {
 setRotation(rotation + 0.08);
 idleRaf = requestAnimationFrame(idleSpin);
}
idleSpin();

function spin() {
 if (spinning) return;
 spinning = true;
 cancelAnimationFrame(idleRaf);
 document.getElementById('spin-btn').style.pointerEvents   = 'none';
 document.getElementById('hub').style.pointerEvents        = 'none';
 document.getElementById('d-spin-btn').style.pointerEvents = 'none';
 document.getElementById('d-hub').style.pointerEvents      = 'none';

 const winIdx  = 10; // always '20'
 const TARGET  = (360 - (winIdx * SEG_DEG + SEG_DEG / 2)) % 360; // 45°
 const cur     = ((rotation % 360) + 360) % 360;
 let   toTop   = (TARGET - cur + 360) % 360;
 if (toTop < 90) toTop += 360;
 const fullSpins = (6 + Math.floor(Math.random() * 4)) * 360;
 const delta = fullSpins + toTop;

 const start = rotation, end = start + delta;
 const dur = 5000 + Math.random() * 1200, t0 = performance.now();

 function ease(t) { return 1 - Math.pow(1 - t, 4.5); }
 function frame(now) {
  const p = Math.min((now - t0) / dur, 1);
  setRotation(start + (end - start) * ease(p));
  if (p < 1) { requestAnimationFrame(frame); }
  else {
   spinning = false;
   idleSpin();
   done(winIdx);
  }
 }
 requestAnimationFrame(frame);
}

function launchConfetti() {
 const colors = ['#FFD700','#FF8C00','#FFFFFF','#FF4500','#FFB400'];
 for (let i = 0; i < 65; i++) {
  const p = document.createElement('div');
  const c = colors[Math.floor(Math.random()*colors.length)];
  const sz = 6 + Math.random()*7;
  const x  = 10 + Math.random()*80;
  const dur = 1.2 + Math.random()*1.5;
  const del = Math.random()*0.5;
  p.style.cssText = `position:fixed;pointer-events:none;z-index:1100;border-radius:${Math.random()>.5?'50%':'2px'};width:${sz}px;height:${sz}px;background:${c};left:${x}vw;top:-12px;animation:confettiFall ${dur}s ease-in ${del}s both;`;
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),(dur+del+.2)*1000);
 }
}

function done(i) {
 const seg = SEGMENTS[i];
 document.getElementById('overlay').style.display = 'flex';
 launchConfetti();
 startCountdown();
 try { localStorage.setItem('pw', JSON.stringify({v: seg, t: Date.now()})); } catch(e) {}
}

function closeModal() {
 document.getElementById('overlay').style.display = 'none';
 clearInterval(window._cdI);
 try { localStorage.removeItem('pw'); } catch(e) {}
 document.getElementById('spin-btn').style.pointerEvents   = '';
 document.getElementById('hub').style.pointerEvents        = '';
 document.getElementById('d-spin-btn').style.pointerEvents = '';
 document.getElementById('d-hub').style.pointerEvents      = '';
 idleSpin();
}

function startCountdown(secs) {
 secs = (secs !== undefined) ? secs : 9 * 60;
 const el = document.getElementById('modal-timer');
 clearInterval(window._cdI);
 function tick() {
  const m = String(Math.floor(secs / 60)).padStart(2,'0');
  const s = String(secs % 60).padStart(2,'0');
  el.textContent = m + 'm' + s + 's';
  if (secs > 0) secs--; else clearInterval(window._cdI);
 }
 tick();
 window._cdI = setInterval(tick, 1000);
}

// ── FAKE LEADERBOARD ──
const LB_NAMES = ['M','J','R','A','C','K','D','L','B','E','N','S','T','V','G'];
const LB_AMTS  = [5,10,20,30,50,100,'FREE SPIN'];
const LB_MAX   = 9;
let lbEntries  = [
  {u:'M***********', a:'₱50',  t:2},
  {u:'J***********', a:'₱20',  t:5},
  {u:'R***********', a:'₱100', t:8},
  {u:'A***********', a:'₱30',  t:11},
  {u:'C***********', a:'₱5',   t:14},
  {u:'K***********', a:'₱20',  t:17},
  {u:'D***********', a:'₱100', t:21},
  {u:'L***********', a:'FREE SPIN', t:24},
  {u:'B***********', a:'₱50',  t:28},
];

function randUser() {
  const l = LB_NAMES[Math.floor(Math.random()*LB_NAMES.length)];
  const stars = '*'.repeat(8 + Math.floor(Math.random()*4));
  return l + stars;
}
function randAmt() {
  const v = LB_AMTS[Math.floor(Math.random()*LB_AMTS.length)];
  return typeof v === 'number' ? '₱'+v : v;
}
function tickLB() {
  lbEntries.forEach(e => { if (e.t < 60) e.t++; });
  lbEntries.unshift({u: randUser(), a: randAmt(), t: 0});
  lbEntries = lbEntries.slice(0, LB_MAX);
  renderLB();
}

function renderLB() {
  function makeRows(entries) {
    return entries.map(e =>
      `<div class="lb-row">
        <span class="lb-user">${e.u}</span>
        <span class="lb-amt">${e.a}</span>
        <span class="lb-time">${e.t === 0 ? 'just now' : e.t+' min'+(e.t>1?'s':'')+' ago'}</span>
      </div>`
    ).join('');
  }
  const mobile  = document.getElementById('leaderboard');
  const desktop = document.getElementById('d-leaderboard');
  if (mobile)  mobile.innerHTML  = makeRows(lbEntries.slice(0, 3));
  if (desktop) desktop.innerHTML = makeRows(lbEntries);
}

renderLB();
setInterval(tickLB, 5000);

// ── Ripple burst ──
function ripple(el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width  / 2;
  const cy = rect.top  + rect.height / 2;
  const sz = Math.max(rect.width, rect.height) * 2.2;
  const r  = document.createElement('div');
  r.style.cssText = `
    position:fixed; pointer-events:none; z-index:9999;
    border-radius:50%;
    width:${sz}px; height:${sz}px;
    left:${cx - sz/2}px; top:${cy - sz/2}px;
    background: radial-gradient(circle, rgba(255,200,0,.55) 0%, rgba(255,140,0,.2) 40%, transparent 70%);
    transform:scale(0); opacity:1;
    animation: ripplePop .55s cubic-bezier(.22,1,.36,1) forwards;
  `;
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 600);
}

// ── Event wiring ──
document.getElementById('spin-btn').addEventListener('click', e => { ripple(e.currentTarget); spin(); });
document.getElementById('hub').addEventListener('click', e => { ripple(e.currentTarget); spin(); });
document.getElementById('d-spin-btn').addEventListener('click', e => { ripple(e.currentTarget); spin(); });
document.getElementById('d-hub').addEventListener('click', e => { ripple(e.currentTarget); spin(); });

document.getElementById('modal-exit').addEventListener('click', closeModal);
document.getElementById('modal-dismiss').addEventListener('click', closeModal);

// Restore popup if a fresh win was cached (within 9 min)
(function() {
 try {
  const d = localStorage.getItem('pw');
  if (!d) return;
  const {v, t} = JSON.parse(d);
  const elapsed = Math.floor((Date.now() - t) / 1000);
  const remain  = 9 * 60 - elapsed;
  if (remain > 0) {
   document.getElementById('overlay').style.display = 'flex';
   startCountdown(remain);
  } else {
   localStorage.removeItem('pw');
  }
 } catch(e) {}
})();
